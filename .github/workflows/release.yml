name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"

      - name: Validate version matches Cargo.toml
        run: |
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          TAG_VERSION="${{ steps.version.outputs.version }}"
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: Tag version ($TAG_VERSION) does not match Cargo.toml version ($CARGO_VERSION)"
            exit 1
          fi

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwayland-dev \
            libxkbcommon-dev \
            libvulkan-dev \
            pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Test
        run: cargo test

      - name: Build release binary
        run: cargo build --release

      - name: Build .deb package
        run: |
          cargo install cargo-deb
          cargo deb --no-build

      - name: Create tarball
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TARBALL="cosmic-shot-${VERSION}-x86_64-linux.tar.gz"
          mkdir -p staging
          cp target/release/cosmic-shot staging/
          cp contrib/cosmic-shot.desktop staging/
          tar -czf "$TARBALL" -C staging .
          echo "TARBALL=$TARBALL" >> "$GITHUB_ENV"

      - name: Find .deb file
        run: |
          DEB=$(ls target/debian/*.deb)
          echo "DEB=$DEB" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ${{ env.DEB }}
            ${{ env.TARBALL }}
